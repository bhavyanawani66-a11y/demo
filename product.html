<!doctype html>
<html lang="en">
<head>

<title>Product · Peakforge</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="site-header">

    <a class="logo" href="index.html">PEAK<span>FORGE</span></a>

  import { mountSearch } from "./js/search.js";
  mountSearch(document.getElementById("search-input"), document.getElementById("search-dropdown"));

</html>
